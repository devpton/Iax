<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;min-height:-webkit-fill-available;background:#080808;display:flex;align-items:flex-start;justify-content:center;font-family:'Courier New',monospace;padding:24px 20px env(safe-area-inset-bottom,20px);color:#e7e9ea;overflow-x:hidden;}
.container{width:100%;max-width:520px;padding-top:8px;}
.header{margin-bottom:28px;display:flex;align-items:flex-end;justify-content:space-between;}
.header-eyebrow{font-size:10px;letter-spacing:0.35em;color:#444;text-transform:uppercase;margin-bottom:6px;}
.header-title{font-size:42px;font-weight:900;letter-spacing:-0.04em;line-height:1;background:linear-gradient(135deg,#fff 60%,#1d9bf0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-badge{font-size:10px;letter-spacing:0.2em;color:#1d9bf0;border:1px solid #1d9bf033;border-radius:20px;padding:4px 10px;text-transform:uppercase;}
.tema-wrap{position:relative;margin-bottom:12px;}
.tema-input{width:100%;padding:13px 42px 13px 16px;background:#0f0f0f;border:1px solid #1f1f1f;border-radius:6px;color:#e7e9ea;font-family:'Courier New',monospace;font-size:14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.tema-input::placeholder{color:#333;}
.tema-input:focus{border-color:#1d9bf044;}
.tema-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#333;font-size:18px;cursor:pointer;padding:4px;line-height:1;-webkit-tap-highlight-color:transparent;}
.tema-hint{font-size:10px;color:#2a2a2a;letter-spacing:0.05em;margin-bottom:16px;padding-left:2px;}
.btn-row{display:flex;gap:8px;margin-bottom:20px;}
.btn{flex:1;padding:15px 10px;font-size:12px;font-family:'Courier New',monospace;font-weight:bold;letter-spacing:0.06em;border-radius:6px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.97);}
.btn:disabled{cursor:not-allowed;transform:none;}
.btn-primary{background:#1d9bf0;border:none;color:#fff;}
.btn-outline{background:transparent;border:1px solid #1d9bf0;color:#1d9bf0;}
.btn-viral{background:transparent;border:1px solid #ff4444;color:#ff4444;}
.btn-loading{background:#0d0d0d;border:1px solid #1f1f1f;color:#444;}
.error{color:#ff4444;font-size:13px;margin-bottom:16px;padding:12px;border:1px solid #2a0000;border-radius:6px;background:#110000;}
.meta-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:11px;letter-spacing:0.08em;}
.meta-style{color:#1d9bf0;}

.post-box{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:18px;margin-bottom:12px;}
.post-text{font-size:15px;line-height:1.65;white-space:pre-wrap;color:#e7e9ea;font-family:inherit;}
.post-footer{display:flex;justify-content:space-between;align-items:center;}
.char-count{font-size:12px;}
.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
.btn-action{padding:8px 13px;border-radius:5px;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;}
.btn-action:active{transform:scale(0.96);}
.btn-ghost{background:transparent;border:1px solid #1f1f1f;color:#444;}
.btn-copy{background:transparent;border:1px solid #1f1f1f;color:#555;}
.btn-copy.copied{background:#0a2a14;border-color:#166534;color:#4ade80;}
.btn-x{background:#000;border:1px solid #2a2a2a;color:#fff;font-weight:bold;}
.thread-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.thread-label{font-size:11px;color:#1d9bf0;letter-spacing:0.1em;}
.thread-news{font-size:11px;color:#2a2a2a;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tweet-row{display:flex;}
.tweet-timeline{display:flex;flex-direction:column;align-items:center;margin-right:11px;width:14px;}
.tweet-dot{width:7px;height:7px;border-radius:50%;margin-top:15px;flex-shrink:0;}
.tweet-dot.first{background:#1d9bf0;}
.tweet-dot.rest{background:#1f1f1f;border:1px solid #2a2a2a;}
.tweet-line{width:1px;flex:1;background:#1a1a1a;margin-top:4px;margin-bottom:4px;}
.tweet-card{flex:1;background:#0f0f0f;border:1px solid #1a1a1a;border-radius:6px;padding:13px;margin-bottom:7px;}

.tweet-footer{display:flex;justify-content:space-between;align-items:center;}
.tweet-chars{font-size:11px;}
.tweet-actions{display:flex;gap:6px;}
.btn-tweet-copy{padding:4px 10px;background:transparent;border:1px solid #1f1f1f;border-radius:3px;color:#333;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-tweet-copy.copied{background:#0a2a14;border-color:#166534;color:#4ade80;}
.btn-tweet-x{padding:4px 10px;background:#000;border:1px solid #1f1f1f;border-radius:3px;color:#fff;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;}
.thread-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn-copy-all{padding:8px 14px;border-radius:5px;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;transition:all 0.2s;background:transparent;border:1px solid #1f1f1f;color:#444;-webkit-tap-highlight-color:transparent;}
.btn-copy-all.copied{background:#0a2a14;border-color:#166534;color:#4ade80;}
.viral-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.viral-label{font-size:11px;color:#ff4444;letter-spacing:0.1em;}
.viral-news{font-size:11px;color:#2a2a2a;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.viral-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:16px;margin-bottom:10px;}
.viral-angulo{font-size:10px;letter-spacing:0.2em;color:#ff4444;text-transform:uppercase;margin-bottom:10px;}
.viral-text{font-size:15px;line-height:1.65;white-space:pre-wrap;color:#e7e9ea;font-family:inherit;margin-bottom:10px;}
.viral-footer{display:flex;justify-content:space-between;align-items:center;}
.viral-chars{font-size:11px;}
.viral-actions{display:flex;gap:6px;}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,0.15);border-top:2px solid currentColor;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.result{animation:fadeIn 0.4s ease;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="container">
  <div class="header">

      <div class="header-eyebrow">gerador de conteúdo</div>

  <div class="tema-wrap">

      placeholder="Tema (ex: IA no Brasil, GPT-5...) ou deixe vazio"
      oninput="onTemaInput()">

  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnPost" onclick="gerarPost()">⚡ POST</button>
    <button class="btn btn-outline" id="btnThread" onclick="gerarThread()">🧵 THREAD</button>

  <div id="error" class="error hidden"></div>

  <div id="postResult" class="result hidden">

      <span class="meta-style" id="postStyle"></span>
      <span class="meta-title" id="postNewsTitle"></span>
    </div>
    <div class="post-box"><div class="post-text" id="postText"></div></div>

      <span class="char-count" id="charCount"></span>

        <button class="btn-action btn-copy" id="btnCopyPost" onclick="copiarPost()">copiar</button>
        <button class="btn-action btn-x" onclick="postarNoX('post')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          postar
        </button>
      </div>
    </div>
  </div>

  <div id="threadResult" class="result hidden">
    <div class="thread-header">
      <span class="thread-label" id="threadLabel"></span>
      <span class="thread-news" id="threadNewsTitle"></span>
    </div>
    <div id="threadTweets"></div>
    <div class="thread-footer">
      <button class="btn-action btn-ghost" onclick="gerarThread()">outra</button>
      <button class="btn-copy-all" id="btnCopyAll" onclick="copiarTudo()">copiar tudo</button>
    </div>
  </div>

  <div id="viralResult" class="result hidden">
    <div class="viral-header">
      <span class="viral-label">🔥 3 variações virais</span>
      <span class="viral-news" id="viralNewsTitle"></span>
    </div>
    <div id="viralCards"></div>
    <div class="thread-footer">
      <button class="btn-action btn-ghost" onclick="gerarViral()">outras</button>
    </div>
  </div>
</div>

<script>
const GEMINI_KEY = 'AIzaSyA5X5OtyijwZqi2M7HgW1DW_CJ8cYS0Ssg';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const POST_STYLES = [
  {name:"noticia_opiniao",label:"📰 Notícia + Opinião",prompt:"Você é um criador de conteúdo de tecnologia brasileiro no X. Escreva um post em português BR. Começa com o fato em 1-2 linhas, depois adiciona UMA opinião forte e direta. Tom: direto, sem enrolação. Máximo 280 caracteres. SEM hashtags. No máximo 1 emoji."},
  {name:"isso_muda_tudo",label:"🔥 Isso Muda Tudo",prompt:"Você é um criador de conteúdo de tecnologia brasileiro no X. Escreva um post em português BR. Começa com uma afirmação forte e provocativa, depois explica em 1 linha. Tom: empolgado mas inteligente. Máximo 280 caracteres. SEM hashtags. No máximo 1 emoji."},
  {name:"dica_pratica",label:"💡 Dica Prática",prompt:"Você é um criador de conteúdo de tecnologia brasileiro no X. Escreva um post em português BR. Transforma em uma dica prática que o leitor pode usar hoje. Tom: útil, conciso. Máximo 280 caracteres. SEM hashtags. SEM emojis."},
  {name:"provocacao",label:"🎯 Provocação",prompt:"Você é um criador de conteúdo de tecnologia brasileiro no X. Escreva um post em português BR. Uma afirmação ou pergunta que gera debate. Tom: provocativo mas inteligente. Máximo 280 caracteres. SEM hashtags. SEM emojis."}
];

const THREAD_PROMPT = `Você é um criador de conteúdo de tecnologia brasileiro no X. Crie uma thread em português BR sobre o tema/notícia abaixo. Retorne APENAS este JSON sem markdown: {"tweets":["Gancho forte que para o scroll. Termina com 🧵","Contexto: o que aconteceu e por que importa","O detalhe mais surpreendente","O que isso significa na prática","Sua opinião direta","CTA: pede retweet ou pergunta pro engajamento"]} Regras: cada tweet máximo 270 chars, tom natural brasileiro, SEM hashtags, SEM numeração nos tweets.`;

const VIRAL_PROMPT = `Você é especialista em conteúdo viral para o X. Dado um tema ou notícia de tecnologia/AI, crie 3 variações de post que maximizam engajamento. Retorne APENAS este JSON sem markdown: {"variacoes":[{"angulo":"Emocional","texto":"post que conecta emocionalmente"},{"angulo":"Provocativo","texto":"post que gera debate saudável — afirmação polêmica mas defensável"},{"angulo":"Dado Surpresa","texto":"post que começa com número ou fato chocante"}]} Regras: cada texto máximo 270 chars, português BR, SEM hashtags, no máximo 1 emoji, tom humano.`;

let currentPost="", currentThread=[], currentViral=[];

async function callGemini(systemPrompt, userPrompt) {
  const prompt = systemPrompt ? `${systemPrompt}\n\n${userPrompt}` : userPrompt;
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      contents: [{parts: [{text: prompt}]}],
      generationConfig: {temperature: 0.9, maxOutputTokens: 2000}
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function buscarNoticia() {
  const tema = getTema();
  let prompt;
  if (tema) {
    prompt = `Você é um assistente que gera contexto para criação de conteúdo. Dado o tema "${tema}", crie um contexto fictício mas realista e atual sobre esse assunto. Retorne APENAS JSON sem markdown: {"titulo":"título descritivo e atual sobre o tema","resumo":"contexto em 2-3 frases sobre o assunto, incluindo detalhes específicos e relevantes"}`;
  } else {
    prompt = `Você é um assistente de criação de conteúdo. Invente uma notícia fictícia mas realista e atual sobre inteligência artificial ou tecnologia que poderia ter acontecido recentemente. Retorne APENAS JSON sem markdown: {"titulo":"título da notícia fictícia","resumo":"resumo em 2-3 frases com detalhes específicos"}`;
  }
  const text = await callGemini("", prompt);
  try {
    const m = text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
  } catch {}
  return {titulo: tema || "Novidade em IA", resumo: text.slice(0, 200)};
}

function getTema() { return document.getElementById('temaInput').value.trim(); }

function onTemaInput() {
  const val = document.getElementById('temaInput').value;
  const clear = document.getElementById('temaClear');
  const hint = document.getElementById('temaHint');
  if (val.trim()) {
    clear.classList.remove('hidden');
    hint.innerHTML = `✏️ gerando sobre: <span style="color:#1d9bf0">"${val.trim()}"</span>`;
  } else {
    clear.classList.add('hidden');
    hint.innerHTML = '🎲 vazio = notícia aleatória do dia';
  }
}

function limparTema() {
  document.getElementById('temaInput').value='';
  onTemaInput();
}

function setLoading(mode) {
  const btns={post:document.getElementById('btnPost'),thread:document.getElementById('btnThread'),viral:document.getElementById('btnViral')};
  const defaults={post:{cls:'btn btn-primary',html:'⚡ POST'},thread:{cls:'btn btn-outline',html:'🧵 THREAD'},viral:{cls:'btn btn-viral',html:'🔥 VIRAL'}};
  Object.keys(btns).forEach(k=>{
    if(k===mode){btns[k].className='btn btn-loading';btns[k].innerHTML=`<span class="spinner"></span> gerando...`;}
    else{btns[k].className=defaults[k].cls;btns[k].innerHTML=defaults[k].html;}
    btns[k].disabled=!!mode;
    btns[k].style.opacity=(mode&&k!==mode)?'0.35':'1';
  });
}

function showError(msg){const el=document.getElementById('error');el.textContent=msg;el.classList.remove('hidden');}
function hideAll(){['error','postResult','threadResult','viralResult'].forEach(id=>document.getElementById(id).classList.add('hidden'));}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateCharCount(text){
  const el=document.getElementById('charCount');const n=text.length;
  el.textContent=`${n}/280`;
  el.style.color=n>280?'#ff4444':n>240?'#ffaa00':'#4ade80';
}

async function gerarPost(){
  hideAll();setLoading('post');
  try{
    const news=await buscarNoticia();
    const style=POST_STYLES[Math.floor(Math.random()*POST_STYLES.length)];
    const text=await callGemini(style.prompt,`Tema/Notícia: ${news.titulo}\n\nContexto: ${news.resumo}\n\nGere o post. Retorna APENAS o texto, sem aspas, sem explicação.`);
    currentPost=text.trim();
    document.getElementById('postStyle').textContent=style.label;
    document.getElementById('postNewsTitle').textContent=news.titulo;
    document.getElementById('postText').textContent=currentPost;
    updateCharCount(currentPost);
    document.getElementById('btnCopyPost').textContent='copiar';
    document.getElementById('btnCopyPost').className='btn-action btn-copy';
    document.getElementById('postResult').classList.remove('hidden');
  }catch(e){showError("Erro: " + e.message);}
  setLoading(null);
}

async function gerarThread(){
  hideAll();setLoading('thread');
  try{
    const news=await buscarNoticia();
    const rawText=await callGemini(THREAD_PROMPT,`Tema/Notícia: ${news.titulo}\n\nContexto: ${news.resumo}\n\nGere a thread.`);
    try{
      const m=rawText.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
      if(m){const p=JSON.parse(m[0]);currentThread=p.tweets.map((t,i)=>`${i+1}/ ${t.replace(/^\d+\/\s*/,'')}`);}
    }catch{currentThread=rawText.split("\n").filter(l=>l.trim().length>20).slice(0,6);}
    document.getElementById('threadLabel').textContent=`🧵 ${currentThread.length} tweets`;
    document.getElementById('threadNewsTitle').textContent=news.titulo;
    const container=document.getElementById('threadTweets');
    container.innerHTML='';
    currentThread.forEach((tweet,i)=>{
      const isLast=i===currentThread.length-1;
      const chars=tweet.length;const cc=chars>270?'#ff4444':'#2a2a2a';
      container.innerHTML+=`<div class="tweet-row"><div class="tweet-timeline"><div class="tweet-dot ${i===0?'first':'rest'}"></div>${!isLast?'<div class="tweet-line"></div>':''}</div><div class="tweet-card"><div class="tweet-text">${escapeHtml(tweet)}</div><div class="tweet-footer"><span class="tweet-chars" style="color:${cc}">${chars}/280</span><div class="tweet-actions"><button class="btn-tweet-copy" id="copyBtn${i}" onclick="copiarTweet(${i})">copiar</button><button class="btn-tweet-x" onclick="postarNoX('tweet',${i})"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>postar</button></div></div></div></div>`;
    });
    document.getElementById('btnCopyAll').textContent='copiar tudo';
    document.getElementById('btnCopyAll').className='btn-copy-all';
    document.getElementById('threadResult').classList.remove('hidden');
  }catch(e){showError("Erro ao gerar. Tenta de novo.");}
  setLoading(null);
}

async function gerarViral(){
  hideAll();setLoading('viral');
  try{
    const news=await buscarNoticia();
    const rawText=await callGemini(VIRAL_PROMPT,`Tema/Notícia: ${news.titulo}\n\nContexto: ${news.resumo}\n\nGere as 3 variações virais.`);
    try{
      const m=rawText.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
      if(m){currentViral=JSON.parse(m[0]).variacoes;}
    }catch{currentViral=[];}
    document.getElementById('viralNewsTitle').textContent=news.titulo;
    const container=document.getElementById('viralCards');
    container.innerHTML='';
    currentViral.forEach((v,i)=>{
      const chars=v.texto.length;const cc=chars>270?'#ff4444':'#2a2a2a';
      container.innerHTML+=`<div class="viral-card"><div class="viral-angulo">${escapeHtml(v.angulo)}</div><div class="viral-text">${escapeHtml(v.texto)}</div><div class="viral-footer"><span class="viral-chars" style="color:${cc}">${chars}/280</span><div class="viral-actions"><button class="btn-tweet-copy" id="viralCopy${i}" onclick="copiarViral(${i})">copiar</button><button class="btn-tweet-x" onclick="postarNoX('viral',${i})"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>postar</button></div></div></div>`;
    });
    document.getElementById('viralResult').classList.remove('hidden');
  }catch(e){showError("Erro ao gerar. Tenta de novo.");}
  setLoading(null);
}

function copiarPost(){
  navigator.clipboard.writeText(currentPost);
  const btn=document.getElementById('btnCopyPost');
  btn.textContent='✓';btn.className='btn-action btn-copy copied';
  setTimeout(()=>{btn.textContent='copiar';btn.className='btn-action btn-copy';},2000);
}
function copiarTweet(i){
  navigator.clipboard.writeText(currentThread[i]);
  const btn=document.getElementById(`copyBtn${i}`);
  btn.textContent='✓';btn.className='btn-tweet-copy copied';
  setTimeout(()=>{btn.textContent='copiar';btn.className='btn-tweet-copy';},2000);
}
function copiarTudo(){
  navigator.clipboard.writeText(currentThread.join('\n\n'));
  const btn=document.getElementById('btnCopyAll');
  btn.textContent='✓ copiado';btn.className='btn-copy-all copied';
  setTimeout(()=>{btn.textContent='copiar tudo';btn.className='btn-copy-all';},2000);
}
function copiarViral(i){
  navigator.clipboard.writeText(currentViral[i].texto);
  const btn=document.getElementById(`viralCopy${i}`);
  btn.textContent='✓';btn.className='btn-tweet-copy copied';
  setTimeout(()=>{btn.textContent='copiar';btn.className='btn-tweet-copy';},2000);
}
function postarNoX(type,index){
  const text=type==='post'?currentPost:type==='tweet'?currentThread[index]:currentViral[index].texto;
  window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank');
}
</script>
</body>
</html>
